<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle d Acces Intelligent</title>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/face-api.js/0.22.2/face-api.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 2rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            opacity: 0.95;
        }

        .controls-bar {
            background: #f8fafc;
            padding: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
        }

        .control-group {
            flex: 1;
            min-width: 200px;
        }

        .control-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.5rem;
            display: block;
        }

        select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        select:hover {
            border-color: #667eea;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-connect {
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(102, 126, 234, 0.3);
            margin-top: 1.5rem;
        }

        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-connect:active {
            transform: translateY(0);
        }

        .btn-connect.connected {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 2rem;
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .video-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        video {
            width: 100%;
            height: auto;
            display: block;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .btn-analyze {
            padding: 1.25rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 1rem;
            font-size: 1.125rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-analyze:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-analyze:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .btn-analyze:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .identity-card {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .identity-card.recognized {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border: 3px solid #10b981;
        }

        .identity-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .identity-name {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .identity-class {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 600;
            color: #475569;
            background: rgba(255, 255, 255, 0.8);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            display: inline-block;
            margin-top: 0.5rem;
        }

        .waiting-text {
            font-size: 1.25rem;
            color: #64748b;
            font-weight: 500;
        }

        .door-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 568px) {
            .door-controls {
                grid-template-columns: 1fr;
            }
        }

        .btn-door {
            padding: 1.5rem;
            border: none;
            border-radius: 1.25rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .btn-door-icon {
            font-size: 2rem;
        }

        .btn-unlock {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .btn-unlock:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-lock {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .btn-lock:hover {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.4);
        }

        .btn-door:active {
            transform: translateY(-1px);
        }

        .status-bar {
            background: #1e293b;
            color: white;
            padding: 1.5rem;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .status-bar.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .status-bar.error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .status-bar.info {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.25rem;
            color: #667eea;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }

        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Controle d Acces Intelligent</h1>
            <p>Systeme de reconnaissance faciale securise</p>
        </div>

        <div id="loadingMessage" class="loading pulse">
            Chargement des modeles de reconnaissance faciale...
        </div>

        <div id="mainContent" class="hidden">
            <div class="controls-bar">
                <div class="control-group">
                    <label class="control-label">Camera</label>
                    <select id="cameraSelect">
                        <option>Chargement des cameras...</option>
                    </select>
                </div>
                <div class="control-group">
                    <button id="btnBLE" class="btn-connect">
                        📡 Connecter ESP32
                    </button>
                </div>
            </div>

            <div class="main-content">
                <div class="video-section">
                    <div class="video-wrapper">
                        <video id="video" autoplay playsinline width="640" height="480"></video>
                        <canvas id="overlay"></canvas>
                    </div>
                    <button id="analyzeBtn" class="btn-analyze">
                        Analyser le Visage
                    </button>
                </div>

                <div class="info-section">
                    <div id="identityCard" class="identity-card">
                        <div class="identity-icon">👤</div>
                        <div class="waiting-text">En attente de reconnaissance</div>
                    </div>

                    <div class="door-controls">
                        <button id="btnUnlock" class="btn-door btn-unlock">
                            <span class="btn-door-icon">🔓</span>
                            <span>Deverrouiller Porte</span>
                        </button>
                        <button id="btnLock" class="btn-door btn-lock">
                            <span class="btn-door-icon">🔒</span>
                            <span>Verrouiller Porte</span>
                        </button>
                    </div>
                </div>
            </div>

            <div id="statusBar" class="status-bar">Systeme pret</div>
        </div>
    </div>

    <script>
        var students = [];
        var labeledDescriptors = [];
        var isProcessing = false;
        var stream = null;
        var modelsLoaded = false;
        var bleDevice = null;
        var bleCharacteristic = null;

        var video = document.getElementById('video');
        var overlay = document.getElementById('overlay');
        var analyzeBtn = document.getElementById('analyzeBtn');
        var identityCard = document.getElementById('identityCard');
        var statusBar = document.getElementById('statusBar');
        var loadingMessage = document.getElementById('loadingMessage');
        var mainContent = document.getElementById('mainContent');
        var cameraSelect = document.getElementById('cameraSelect');
        var btnBLE = document.getElementById('btnBLE');
        var btnUnlock = document.getElementById('btnUnlock');
        var btnLock = document.getElementById('btnLock');

        function loadModels() {
            var MODEL_URL = '/SecureLab/models';
            
            return faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL)
                .then(function() {
                    return faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                })
                .then(function() {
                    return faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                })
                .then(function() {
                    console.log('Modeles charges');
                    modelsLoaded = true;
                });
        }

        function loadStudentData() {
            return fetch('./students.json')
                .then(function(response) {
                    return response.json();
                })
                .then(function(data) {
                    students = data;
                    console.log('Donnees chargees: ' + students.length + ' etudiants');
                });
        }

        function loadReferenceImages() {
            var labeledDescriptorsArray = [];
            var promises = [];

            for (var i = 0; i < students.length; i++) {
                (function(student) {
                    var promise = faceapi.fetchImage('./assets/' + student.id + '.png')
                        .then(function(img) {
                            return faceapi.detectSingleFace(img)
                                .withFaceLandmarks()
                                .withFaceDescriptor();
                        })
                        .then(function(detection) {
                            if (detection) {
                                var descriptors = [detection.descriptor];
                                labeledDescriptorsArray.push(
                                    new faceapi.LabeledFaceDescriptors(student.id, descriptors)
                                );
                                console.log('Visage charge: ' + student.id);
                            }
                        })
                        .catch(function(error) {
                            console.error('Erreur eleve ' + student.id);
                        });
                    promises.push(promise);
                })(students[i]);
            }

            return Promise.all(promises).then(function() {
                labeledDescriptors = labeledDescriptorsArray;
                console.log(labeledDescriptors.length + ' visages charges');
            });
        }

        function getCameras() {
            return navigator.mediaDevices.enumerateDevices()
                .then(function(devices) {
                    var videoDevices = devices.filter(function(device) {
                        return device.kind === 'videoinput';
                    });
                    
                    cameraSelect.innerHTML = '';
                    videoDevices.forEach(function(device) {
                        var option = document.createElement('option');
                        option.value = device.deviceId;
                        option.text = device.label || 'Camera ' + (cameraSelect.length + 1);
                        cameraSelect.appendChild(option);
                    });
                    
                    return videoDevices.length > 0 ? videoDevices[0].deviceId : null;
                });
        }

        function startCamera(deviceId) {
            if (stream) {
                stream.getTracks().forEach(function(track) { track.stop(); });
            }

            var constraints = {
                video: {
                    deviceId: deviceId ? { exact: deviceId } : undefined,
                    width: 640,
                    height: 480
                }
            };

            return navigator.mediaDevices.getUserMedia(constraints)
                .then(function(mediaStream) {
                    stream = mediaStream;
                    video.srcObject = stream;
                });
        }

        function connectBLE() {
            if (!navigator.bluetooth) {
                showStatus('error', 'Bluetooth non supporte sur ce navigateur');
                return;
            }

            navigator.bluetooth.requestDevice({
                filters: [{ name: 'ESP32' }],
                optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
            })
            .then(function(device) {
                bleDevice = device;
                return device.gatt.connect();
            })
            .then(function(server) {
                return server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
            })
            .then(function(service) {
                return service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
            })
            .then(function(characteristic) {
                bleCharacteristic = characteristic;
                btnBLE.textContent = 'ESP32 Connecte';
                btnBLE.classList.add('connected');
                showStatus('success', 'ESP32 connecte avec succes');
            })
            .catch(function(error) {
                console.error('Erreur BLE:', error);
                showStatus('error', 'Erreur de connexion ESP32');
            });
        }

        function sendBLECommand(command) {
            if (!bleCharacteristic) {
                showStatus('error', 'ESP32 non connecte');
                return;
            }

            var data = new Uint8Array([command]);
            bleCharacteristic.writeValue(data)
                .then(function() {
                    console.log('Commande envoyee: ' + command);
                })
                .catch(function(error) {
                    console.error('Erreur envoi:', error);
                });
        }

        function captureAndRecognize() {
            if (isProcessing || !modelsLoaded || labeledDescriptors.length === 0) return;
            
            isProcessing = true;
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = 'Analyse en cours...';
            
            showStatus('info', 'Analyse en cours...');

            faceapi.detectAllFaces(video)
                .withFaceLandmarks()
                .withFaceDescriptors()
                .then(function(detections) {
                    if (detections.length === 0) {
                        displayWaitingState();
                        showStatus('error', 'AUCUN VISAGE DETECTE');
                        resetAnalyzeButton();
                        return;
                    }

                    var faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
                    var displaySize = { width: video.videoWidth, height: video.videoHeight };
                    faceapi.matchDimensions(overlay, displaySize);
                    var resizedDetections = faceapi.resizeResults(detections, displaySize);
                    overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);

                    var bestMatch = null;
                    var bestDistance = 1;

                    for (var i = 0; i < resizedDetections.length; i++) {
                        var detection = resizedDetections[i];
                        var match = faceMatcher.findBestMatch(detection.descriptor);
                        
                        var box = detection.detection.box;
                        var drawBox = new faceapi.draw.DrawBox(box, {
                            label: match.label !== 'unknown' ? match.label : 'Inconnu',
                            boxColor: match.label !== 'unknown' ? '#10b981' : '#ef4444'
                        });
                        drawBox.draw(overlay);

                        if (match.label !== 'unknown' && match.distance < bestDistance) {
                            bestDistance = match.distance;
                            bestMatch = match;
                        }
                    }

                    if (bestMatch && bestMatch.label !== 'unknown') {
                        var student = null;
                        for (var j = 0; j < students.length; j++) {
                            if (students[j].id === bestMatch.label) {
                                student = students[j];
                                break;
                            }
                        }
                        
                        if (student) {
                            displayStudentInfo(student);
                            showStatus('success', 'ACCES AUTORISE');
                        } else {
                            displayWaitingState();
                            showStatus('error', 'ACCES REFUSE');
                        }
                    } else {
                        displayWaitingState();
                        showStatus('error', 'ACCES REFUSE - PERSONNE NON RECONNUE');
                    }

                    resetAnalyzeButton();
                })
                .catch(function(error) {
                    console.error('Erreur:', error);
                    showStatus('error', 'Erreur lors de la reconnaissance');
                    resetAnalyzeButton();
                });
        }

        function resetAnalyzeButton() {
            isProcessing = false;
            analyzeBtn.disabled = false;
            analyzeBtn.textContent = 'Analyser le Visage';
        }

        function displayStudentInfo(student) {
            identityCard.className = 'identity-card recognized';
            identityCard.innerHTML = '<div class="identity-icon">✓</div><div class="identity-name">' + student.nom + ' ' + student.prenom + '</div><div class="identity-class">Classe: ' + student.classe + '</div>';
        }

        function displayWaitingState() {
            identityCard.className = 'identity-card';
            identityCard.innerHTML = '<div class="identity-icon">👤</div><div class="waiting-text">En attente de reconnaissance</div>';
        }

        function showStatus(type, message) {
            statusBar.className = 'status-bar ' + type;
            statusBar.textContent = message;
        }

        function initialize() {
            loadModels()
                .then(function() {
                    return loadStudentData();
                })
                .then(function() {
                    return loadReferenceImages();
                })
                .then(function() {
                    return getCameras();
                })
                .then(function(deviceId) {
                    return startCamera(deviceId);
                })
                .then(function() {
                    loadingMessage.classList.add('hidden');
                    mainContent.classList.remove('hidden');
                    console.log('Systeme pret');
                });
        }

        analyzeBtn.addEventListener('click', captureAndRecognize);
        btnBLE.addEventListener('click', connectBLE);
        
        btnUnlock.addEventListener('click', function() {
            sendBLECommand(1);
            showStatus('success', 'Porte deverrouillee');
        });
        
        btnLock.addEventListener('click', function() {
            sendBLECommand(2);
            showStatus('error', 'Porte verrouillee');
        });

        cameraSelect.addEventListener('change', function() {
            startCamera(this.value);
        });

        window.addEventListener('beforeunload', function() {
            if (stream) {
                stream.getTracks().forEach(function(track) { track.stop(); });
            }
        });

        window.addEventListener('DOMContentLoaded', initialize);
    </script>
</body>
</html>
